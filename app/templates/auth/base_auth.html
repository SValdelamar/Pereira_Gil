<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Centro Minero SENA</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logos/Logo_Sena.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logos/Logo_Sena.png') }}">
    
    <!-- Bootstrap y dependencias locales (sin CDN) -->
    <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.min.css') }}" rel="stylesheet">
    
    <!-- CSS Modular -->py
    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/modules.css') | cache_bust }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-body-clean bg-light">
    <!-- Contenido principal fijo -->
    <main class="auth-main-full">
        {% block auth_content %}
        <!-- Contenido específico de cada página -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="auth-footer">
        <div class="container text-center">
            <p class="mb-2">
                <i class="bi bi-c-circle me-1"></i>2025 Centro Minero SENA | GIL v1.0
            </p>
            <p class="mb-0">
                Desarrollado por: Steven Valdelamar
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS local (sin CDN) -->
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    
    <!-- Password Toggle Component -->
    <script src="{{ url_for('static', filename='js/password-toggle.js') }}"></script>
    
    <!-- Password Validator Component -->
    <script src="{{ url_for('static', filename='js/password-validator.js') }}"></script>
    
    <script>
      // Aplicar accesibilidad también en páginas de autenticación
      (function() {
        function aplicarPreferencias() {
          const body = document.body;
          const altoContraste = localStorage.getItem('accesibilidad_alto_contraste') === 'true';
          const tamanoTexto = localStorage.getItem('accesibilidad_tamano_texto') || '100';
          const modoOscuro = localStorage.getItem('accesibilidad_modo_oscuro') === 'true';
          const animaciones = localStorage.getItem('accesibilidad_animaciones') === 'true';
          body.classList.toggle('alto-contraste', altoContraste);
          body.classList.toggle('modo-oscuro', modoOscuro);
          body.classList.toggle('animaciones-reducidas', animaciones);
          body.style.fontSize = tamanoTexto + '%';
        }
        document.addEventListener('DOMContentLoaded', aplicarPreferencias);
      })();
    </script>

    {% block extra_js %}
    {% endblock %}
</body>
</html>
